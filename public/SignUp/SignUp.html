<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piyesa — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="SignUp.css" />
  </head>
  <body>
    <main>
      <section class="page-shell">
        <div class="login-layout">
          <div class="login-header">
            <span class="login-branding"><span class="brand-accent">Pi</span><span class="brand-muted">yesa</span></span>
            <p class="login-tagline">AI Powered Bill Of Materials Generator</p>
          </div>

          <div class="login-card">
            <h2 class="login-title">Sign up</h2>

            <form id="signupForm" novalidate class="login-fields">
              <label class="login-field-row">
                <span class="field-label">Username</span>
                <div class="login-input-row">
                  <input id="fullName" name="fullName" type="text" placeholder="Username" required />
                </div>
              </label>

              <label class="login-field-row">
                <span class="field-label">Email</span>
                <div class="login-input-row">
                  <input id="email" name="email" type="email" placeholder="Enter your email address" required />
                </div>
              </label>

              <label class="login-field-row">
                <span class="field-label">Password</span>
                <div class="login-input-row password-wrap">
                  <input id="password" name="password" type="password" placeholder="Create a strong password" required />
                  <button type="button" class="toggle-password" data-target="password">Show</button>
                </div>
                <div class="meter" aria-hidden="true">
                  <span id="meterBar"></span>
                </div>
                <div class="meter-labels">
                  <span id="strengthText">Weak</span>
                </div>
              </label>

              <label class="login-field-row">
                <span class="field-label">Confirm password</span>
                <div class="login-input-row password-wrap">
                  <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat password" required />
                  <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
                </div>
              </label>

              <label class="checkbox-label" for="terms">
                <input id="terms" name="terms" type="checkbox" required />
                <span>I agree to the terms and privacy policy.</span>
              </label>

              <button type="submit" class="btn btn-primary btn-large">Create account</button>
            </form>

            <p class="login-footer">Already have an account? <a href="../login.html" class="text-link">Log in</a></p>
            <div id="formStatus" class="status-message" role="status" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="SignUp.js"></script>
  </body>
</html>
